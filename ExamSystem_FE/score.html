<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <title>Kết quả bài thi</title>

    <style>
        /* ===== VARIABLES ===== */
        :root {
            --white: #ffffff;
            --gray-light: #f8fafc;
            --gray-border: #e2e8f0;
            --gray-text: #334155;
            --gray-dark: #1e293b;
            --primary-blue: #2563eb;
            --primary-blue-hover: #1d4ed8;
            --green-light: #dcfce7;
            --green-medium: #86efac;
            --green-text: #166534;
            --orange-light: #fed7aa;
            --orange-medium: #fdba74;
            --orange-text: #9a3412;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --radius: 12px;
            --font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        /* ===== BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--gray-light);
            color: var(--gray-text);
            line-height: 1.5;
            padding: 30px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ===== HEADINGS ===== */
        h2 {
            font-size: 28px;
            font-weight: 600;
            color: var(--gray-dark);
            margin-bottom: 12px;
            text-align: center;
        }

        #correctCount {
            font-size: 18px;
            font-weight: 500;
            color: var(--primary-blue);
            background-color: var(--white);
            padding: 10px 24px;
            border-radius: 40px;
            border: 1px solid var(--gray-border);
            box-shadow: var(--shadow-sm);
            margin-bottom: 30px;
            display: inline-block;
        }

        /* ===== TABLE ===== */
        table {
            width: 100%;
            max-width: 1200px;
            background-color: var(--white);
            border-radius: var(--radius);
            border-collapse: collapse;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            margin-bottom: 30px;
        }

        /* Table header */
        thead tr {
            background-color: var(--primary-blue);
            color: var(--white);
        }

        th {
            font-weight: 600;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 16px 20px;
            text-align: left;
        }

        /* Table body */
        tbody tr {
            border-bottom: 1px solid var(--gray-border);
            transition: background-color 0.15s ease;
        }

        tbody tr:hover {
            background-color: #f1f5f9;
            /* slightly darker than gray-light */
        }

        td {
            padding: 16px 20px;
            font-size: 15px;
            vertical-align: top;
        }

        /* Cột STT */
        td:first-child {
            font-weight: 600;
            color: var(--gray-dark);
            text-align: center;
        }

        /* Cột nội dung câu hỏi và option */
        td:nth-child(2) {
            max-width: 500px;
        }

        /* Đáp án của bạn và đáp án đúng */
        td:nth-child(3),
        td:nth-child(4) {
            font-weight: 500;
        }

        /* Trạng thái đúng/sai (giả sử JS thêm class vào hàng hoặc ô) */
        tr.correct td:nth-child(3),
        tr.correct td:nth-child(4) {
            background-color: var(--green-light);
            color: var(--green-text);
            border-radius: 4px;
        }

        tr.incorrect td:nth-child(3) {
            background-color: var(--orange-light);
            color: var(--orange-text);
            border-radius: 4px;
        }

        tr.incorrect td:nth-child(4) {
            background-color: var(--green-light);
            color: var(--green-text);
            border-radius: 4px;
        }

        /* Nếu muốn highlight ô cụ thể, có thể thêm class riêng */
        td.correct-answer {
            background-color: var(--green-light);
            color: var(--green-text);
            font-weight: 600;
            border-radius: 4px;
        }

        td.wrong-answer {
            background-color: var(--orange-light);
            color: var(--orange-text);
            font-weight: 600;
            border-radius: 4px;
        }

        /* ===== BUTTON ===== */
        .home-btn {
            background-color: var(--primary-blue);
            color: var(--white);
            border: none;
            padding: 14px 36px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: var(--shadow-sm);
            font-family: var(--font-family);
            letter-spacing: 0.3px;
            border: 1px solid transparent;
        }

        .home-btn:hover {
            background-color: var(--primary-blue-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .home-btn:active {
            transform: translateY(0);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }

            th,
            td {
                padding: 12px 16px;
            }

            h2 {
                font-size: 24px;
            }

            #correctCount {
                font-size: 16px;
                padding: 8px 20px;
            }

            .home-btn {
                padding: 12px 30px;
                font-size: 16px;
            }
        }
    </style>

</head>

<body>
    <h2>Kết quả bài thi</h2>
    <p id="correctCount"></p>
    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Nội dung câu hỏi và Option</th>
                <th>Đáp án của bạn</th>
                <th>Đáp án đúng</th>
            </tr>
        </thead>
        <tbody id="scoreTable"></tbody>
    </table>
    <button class="home-btn" onclick="goHome()">Trang chủ</button>
    <script src="assets/js/modules/score.js"></script>
</body>

</html>
